version: '3.8'

services:
  nexus-app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - MONGODB_URI=mongodb://mongodb:27017/nexusai
      # Never hardcode secrets here. Provide JWT_SECRET via an .env file or
      # your orchestrator's secret store; the server fails fast if it is unset.
      - JWT_SECRET=${JWT_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - nexus-data:/data/db
    restart: unless-stopped

volumes:
  nexus-data:
